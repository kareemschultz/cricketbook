<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Flow wave / scoring pulse -->
  <path d="M80 300 Q150 200 210 260 Q270 320 330 220 Q390 120 440 200"
        stroke="url(#wave)" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Score dots along wave -->
  <circle cx="210" cy="260" r="12" fill="#34d399"/>
  <circle cx="330" cy="220" r="12" fill="#60a5fa"/>
  <!-- SF initials -->
  <text x="256" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" text-anchor="middle" letter-spacing="6">SF</text>
</svg>
